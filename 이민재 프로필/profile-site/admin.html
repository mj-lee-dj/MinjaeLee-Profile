<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>관리자 — 이민재 포트폴리오</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #0e0e10;
      --card: #1a1a1e;
      --card2: #222228;
      --border: #2e2e34;
      --red: #e50914;
      --blue: #3b82f6;
      --green: #22c55e;
      --text: #f5f5f5;
      --text2: #9ca3af;
      --font: 'Pretendard', 'Noto Sans KR', 'Inter', sans-serif;
      --radius: 10px
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh
    }

    a {
      color: inherit;
      text-decoration: none
    }

    .layout {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: 240px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: fixed;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 10
    }

    .sidebar-logo {
      font-size: 1.1rem;
      font-weight: 800;
      padding: 0 24px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px
    }

    .sidebar-logo span {
      color: var(--red)
    }

    .sidebar-nav {
      list-style: none
    }

    .sidebar-nav a,
    .sidebar-nav button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 24px;
      font-size: .9rem;
      font-weight: 600;
      color: var(--text2);
      transition: all .2s;
      cursor: pointer;
      border: none;
      background: none;
      text-align: left;
      font-family: inherit
    }

    .sidebar-nav a:hover,
    .sidebar-nav button:hover {
      background: rgba(255, 255, 255, .04);
      color: #fff
    }

    .sidebar-nav a.active,
    .sidebar-nav button.active {
      color: #fff;
      background: rgba(229, 9, 20, .12);
      border-right: 3px solid var(--red)
    }

    .main {
      margin-left: 240px;
      flex: 1;
      padding: 32px 40px;
      max-width: 1100px
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 800
    }

    .page-title small {
      font-size: .85rem;
      font-weight: 500;
      color: var(--text2);
      margin-left: 8px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit
    }

    .btn-red {
      background: var(--red);
      color: #fff
    }

    .btn-red:hover {
      background: #b20710
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2)
    }

    .btn-outline:hover {
      border-color: #555;
      color: #fff
    }

    .btn-green {
      background: var(--green);
      color: #fff
    }

    .btn-green:hover {
      background: #16a34a
    }

    .btn-blue {
      background: var(--blue);
      color: #fff
    }

    .btn-blue:hover {
      background: #2563eb
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: .8rem
    }

    .btn-danger {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, .12)
    }

    .data-table {
      width: 100%;
      border-collapse: collapse
    }

    .data-table th {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text2);
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      letter-spacing: .06em;
      text-transform: uppercase
    }

    .data-table td {
      font-size: .88rem;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      vertical-align: top
    }

    .data-table tr:hover td {
      background: rgba(255, 255, 255, .02)
    }

    .data-table .actions {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    .hl-badge {
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(229, 9, 20, .15);
      color: var(--red);
      font-weight: 700
    }

    .link-badge {
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(59, 130, 246, .15);
      color: var(--blue);
      font-weight: 700
    }

    .img-badge {
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(34, 197, 94, .15);
      color: var(--green);
      font-weight: 700
    }

    .td-thumb {
      width: 60px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border)
    }

    /* 모달 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      z-index: 100;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      backdrop-filter: blur(4px)
    }

    .modal-overlay.open {
      display: flex
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 640px;
      max-width: 100%;
      padding: 32px
    }

    .modal h3 {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 20px
    }

    .form-row {
      margin-bottom: 16px
    }

    .form-label {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 6px;
      display: block
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border .2s
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--red)
    }

    .form-textarea {
      height: 80px;
      resize: vertical
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .9rem
    }

    .form-check input {
      accent-color: var(--red);
      width: 18px;
      height: 18px
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border)
    }

    .form-hint {
      font-size: .75rem;
      color: var(--text2);
      margin-top: 4px
    }

    /* 링크 미리보기 영역 */
    .link-preview-area {
      margin-top: 8px;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--card2);
      border: 1px solid var(--border)
    }

    .link-row {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .link-row .form-input {
      flex: 1
    }

    .fetch-btn {
      white-space: nowrap
    }

    .preview-result {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--border)
    }

    .preview-result img {
      max-height: 120px;
      border-radius: 6px;
      margin-top: 8px;
      border: 1px solid var(--border)
    }

    .preview-desc {
      font-size: .85rem;
      color: var(--text2);
      margin-top: 8px;
      line-height: 1.5
    }

    .fetching {
      color: var(--blue);
      font-size: .85rem;
      animation: pulse 1.2s ease infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* 이미지 목록 */
    .img-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px
    }

    .img-list-item {
      position: relative;
      width: 100px;
      height: 70px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border)
    }

    .img-list-item img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .img-list-item .remove-img {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .7);
      color: #fff;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* 통계 카드 */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 36px
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center
    }

    .sc-val {
      font-size: 2rem;
      font-weight: 800;
      color: var(--red)
    }

    .sc-label {
      font-size: .82rem;
      color: var(--text2);
      margin-top: 4px
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 10px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      font-size: .9rem;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: all .35s ease
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    .preview-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--blue);
      font-size: .85rem;
      font-weight: 600;
      margin-top: 8px
    }

    .preview-link:hover {
      text-decoration: underline
    }

    /* 자동 등록 */
    .auto-zone {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px
    }

    .auto-zone h4 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px
    }

    .drop-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      color: var(--text2);
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 16px
    }

    .drop-area:hover,
    .drop-area.dragover {
      border-color: var(--red);
      background: rgba(229, 9, 20, .04);
      color: #fff
    }

    .drop-area input[type=file] {
      display: none
    }

    .ai-status {
      padding: 16px;
      border-radius: var(--radius);
      background: var(--card2);
      border: 1px solid var(--border);
      margin-top: 12px;
      font-size: .9rem;
      line-height: 1.7
    }

    .ai-result-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 16px
    }

    .ai-result-card h4 {
      color: var(--red);
      margin-bottom: 12px
    }

    .ai-field {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: .88rem
    }

    .ai-field .label {
      font-weight: 700;
      color: var(--text2);
      min-width: 80px;
      flex-shrink: 0
    }

    .ai-field .value {
      flex: 1
    }

    .ai-img-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0
    }

    .ai-img-preview img {
      height: 80px;
      border-radius: 6px;
      border: 1px solid var(--border)
    }

    .api-key-area {
      margin-bottom: 24px;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius)
    }

    .api-key-area .form-input {
      max-width: 480px
    }

    @media(max-width:768px) {
      .sidebar {
        width: 100%;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px
      }

      .sidebar-nav {
        display: flex;
        overflow-x: auto;
        gap: 4px
      }

      .sidebar-nav a,
      .sidebar-nav button {
        white-space: nowrap;
        padding: 8px 16px;
        border-right: none !important
      }

      .main {
        margin-left: 0;
        padding: 20px
      }

      .stat-cards {
        grid-template-columns: repeat(2, 1fr)
      }

      .layout {
        flex-direction: column
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20%,
      60% {
        transform: translateX(-5px);
      }

      40%,
      80% {
        transform: translateX(5px);
      }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
      border-color: #ef4444 !important;
    }

    /* 드래그앤드롭 스타일 */
    .drag-handle {
      cursor: grab;
      font-size: 1.1rem;
      color: var(--text2);
      user-select: none;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all .2s;
    }

    .drag-handle:hover {
      color: var(--red);
      background: rgba(229, 9, 20, .1);
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    tr.dragging {
      opacity: .4;
      background: var(--card2) !important;
    }

    tr.drag-over {
      border-top: 2px solid var(--red) !important;
    }

    tr.drag-over-below {
      border-bottom: 2px solid var(--red) !important;
    }

    /* 이미지 드래그앤드롭 */
    .img-list-item.img-dragging {
      opacity: .35;
      transform: scale(.9);
    }

    .img-list-item.img-drag-over {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">관리자<span>.</span></div>
      <ul class="sidebar-nav" id="sideNav">
        <li><button class="active" data-tab="dashboard">📊 대시보드</button></li>
        <li><button data-tab="autoRegister" style="color:var(--red);font-weight:800">🤖 자동 등록</button></li>
        <li><button data-tab="lectures">🎤 강의이력</button></li>
        <li><button data-tab="publications">📚 저서</button></li>
        <li><button data-tab="courses">📺 원격연수</button></li>
        <li><button onclick="currentTab='youtube';render()">🎬 민재쌤 영상</button></li>
        <li><button data-tab="awards">🏆 수상</button></li>
        <li><button data-tab="activities">📌 활동</button></li>
        <li><button data-tab="press">📰 보도자료</button></li>
        <li style="margin-top:20px;border-top:1px solid var(--border);padding-top:20px">
          <button onclick="downloadDataJs()" style="color:var(--green)">💾 data_v3.js 다운로드 (모바일 픽스)</button>
        </li>
        <li><a href="index.html">← 사이트로 이동</a></li>
      </ul>
    </aside>
    <div class="main" id="mainContent"></div>
  </div>
  <div class="modal-overlay" id="modal">
    <div class="modal" id="modalBody"></div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- 관리자 로그인 오버레이 -->
  <div id="loginOverlay"
    style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px">
    <div style="text-align:center">
      <div style="font-size:3rem;margin-bottom:20px">🔒</div>
      <h2 style="margin-bottom:10px">관리자 접근 권한 확인</h2>
      <p style="color:var(--text2);margin-bottom:24px">페이지에 접근하려면 비밀번호를 입력하세요.</p>
      <input type="password" id="adminPw" class="form-input"
        style="width:280px;text-align:center;font-size:1.2rem;letter-spacing:4px" placeholder="Password" />
      <button class="btn btn-red" style="width:100%;margin-top:12px;padding:12px" onclick="checkAdmin()">로그인</button>
      <div id="loginMsg" style="color:#ef4444;margin-top:12px;font-size:.9rem;min-height:20px"></div>
    </div>
  </div>

  <script src="data_v3.js"></script>
  <script>
    /* ── 간단한 비밀번호 보호 (클라이언트 사이드) ── */
    (function () {
      const isAuth = localStorage.getItem('admin_auth');
      if (isAuth === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
      } else {
        document.body.style.overflow = 'hidden'; // 스크롤 방지
      }
    })();

    function checkAdmin() {
      const pw = document.getElementById('adminPw').value;
      const msg = document.getElementById('loginMsg');
      if (pw === 'dhdpswnl2@') {
        localStorage.setItem('admin_auth', 'true');
        document.getElementById('loginOverlay').style.display = 'none';
        document.body.style.overflow = '';
        showToast('🔓 로그인 성공');
      } else {
        msg.textContent = '비밀번호가 올바르지 않습니다.';
        document.getElementById('adminPw').classList.add('shake');
        setTimeout(() => document.getElementById('adminPw').classList.remove('shake'), 400);
      }
    }

    document.getElementById('adminPw')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAdmin();
    });
    let D = profileData;
    const main = document.getElementById('mainContent');
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    const toast = document.getElementById('toast');
    let currentTab = 'dashboard';

    const REPO_OWNER = 'mj-lee-dj';
    const REPO_NAME = 'MinjaeLee-Profile';
    const FILE_PATH = 'profile-site/data_v3.js';

    /* [GitHub 연동] 초기 데이터 로드 (최신 데이터 동기화) */
    (async function initAdmin() {
      let remoteText = null;
      const token = localStorage.getItem('gh_token');

      // 1. 토큰이 있다면 API로 가져오기 (캐시 회피, 최신본 보장)
      if (token) {
        try {
          // commits/main -> sha -> blob 방식이 가장 확실하지만, contents API의 raw 헤더 사용
          const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?ref=main`, {
            headers: {
              'Authorization': `token ${token}`,
              'Accept': 'application/vnd.github.v3.raw'
            }
          });
          if (res.ok) {
            remoteText = await res.text();
            console.log('📦 Admin: Data loaded from GitHub API (Fresh)');
          } else {
            if (res.status === 401) localStorage.removeItem('gh_token'); // 토큰 만료 시 삭제
          }
        } catch (e) {
          console.warn('GitHub API Load failed:', e);
        }
      }

      // 2. 토큰이 없거나 실패했다면 Raw URL 사용 (CDN 캐시 가능성 있음)
      if (!remoteText) {
        try {
          const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`);
          if (res.ok) {
            remoteText = await res.text();
            console.log('📦 Admin: Data loaded from GitHub Raw (Cached)');
          }
        } catch (e) {
          console.warn('GitHub Raw Load failed:', e);
        }
      }

      // 3. 데이터 파싱 및 적용
      if (remoteText) {
        const match = remoteText.match(/const profileData = ({[\s\S]*?});/);
        if (match && match[1]) {
          try {
            const remoteData = JSON.parse(match[1]);
            D = remoteData;
            if (currentTab === 'dashboard') renderDashboard();
          } catch (jsonErr) {
            console.warn('JSON Parse Error:', jsonErr);
          }
        }
      }
    })();

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7) }

    /* ══════════════════════════════════════════
       GitHub 저장 (데이터베이스)
       ══════════════════════════════════════════ */


    let _saving = false; // 동시 저장 방지 잠금

    async function save() {
      if (_saving) { showToast('⏳ 저장이 진행 중입니다...'); return; }
      _saving = true;

      let token = localStorage.getItem('gh_token');
      if (!token) {
        token = prompt('GitHub Personal Access Token을 입력하세요.\n(repo 권한 필요, 한 번 입력하면 저장됩니다.)');
        if (!token) { _saving = false; return; }
        localStorage.setItem('gh_token', token);
      }

      const API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
      const headers = { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' };

      try {
        /* ── 1단계: 최신 커밋 & 트리 SHA ── */
        showToast('☁️ 저장 준비 중...');
        const refRes = await fetch(`${API}/git/refs/heads/main`, { headers });
        if (!refRes.ok) {
          if (refRes.status === 401 || refRes.status === 403) {
            localStorage.removeItem('gh_token');
            throw new Error('토큰이 유효하지 않거나 권한이 없습니다.');
          }
          throw new Error('브랜치 정보 조회 실패');
        }
        const latestCommitSha = (await refRes.json()).object.sha;
        const baseTreeSha = (await (await fetch(`${API}/git/commits/${latestCommitSha}`, { headers })).json()).tree.sha;

        /* ── 2단계: base64 이미지를 개별 파일로 추출·업로드 ── */
        const dataClone = JSON.parse(JSON.stringify(D));
        const treeEntries = [];       // 트리에 추가할 파일 목록
        const uploadCache = new Map(); // 중복 방지 캐시 (hashKey → url)
        let imgCount = 0;

        /* base64 이미지 URL이면 blob으로 업로드하고 GitHub raw URL 반환 */
        async function uploadIfBase64(val) {
          if (typeof val !== 'string' || !val.startsWith('data:image/')) return val;
          const m = val.match(/^data:image\/([^;]+);base64,(.+)$/s);
          if (!m) return val;
          const ext = m[1].replace('+xml', '').replace('jpeg', 'jpg');
          const b64 = m[2];

          /* 중복 체크 (base64 앞부분+길이로 해시 생성) */
          const hashKey = b64.substring(0, 64) + '_' + b64.length;
          if (uploadCache.has(hashKey)) return uploadCache.get(hashKey);

          imgCount++;
          showToast(`📤 이미지 업로드 중... (${imgCount}장)`);

          const blobRes = await fetch(`${API}/git/blobs`, {
            method: 'POST', headers,
            body: JSON.stringify({ content: b64, encoding: 'base64' })
          });
          if (!blobRes.ok) {
            const err = await blobRes.json().catch(() => ({}));
            throw new Error(`이미지 ${imgCount} 업로드 실패: ${err.message || blobRes.status}`);
          }
          const blob = await blobRes.json();
          const filePath = `profile-site/uploads/${blob.sha.substring(0, 12)}.${ext}`;
          const rawUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${filePath}`;

          treeEntries.push({ path: filePath, mode: '100644', type: 'blob', sha: blob.sha });
          uploadCache.set(hashKey, rawUrl);
          return rawUrl;
        }

        /* 객체 전체를 순회하며 base64 이미지 추출 */
        async function processObj(obj) {
          if (!obj || typeof obj !== 'object') return;
          const keys = Array.isArray(obj) ? obj.keys() : Object.keys(obj);
          for (const k of keys) {
            if (typeof obj[k] === 'string') {
              obj[k] = await uploadIfBase64(obj[k]);
            } else if (typeof obj[k] === 'object') {
              await processObj(obj[k]);
            }
          }
        }

        await processObj(dataClone);

        /* ── 3단계: 축소된 data.js blob 생성 ── */
        showToast('📄 데이터 파일 저장 중...');
        const newContent = `/* \n  [Profile Data] \n  Updated at: ${new Date().toISOString()} \n*/\nconst profileData = ${JSON.stringify(dataClone)};\n`;

        const dataBlobRes = await fetch(`${API}/git/blobs`, {
          method: 'POST', headers,
          body: JSON.stringify({ content: newContent, encoding: 'utf-8' })
        });
        if (!dataBlobRes.ok) {
          const err = await dataBlobRes.json().catch(() => ({}));
          throw new Error(`데이터 저장 실패: ${err.message || dataBlobRes.status}`);
        }
        treeEntries.push({ path: FILE_PATH, mode: '100644', type: 'blob', sha: (await dataBlobRes.json()).sha });

        /* ── 4단계: 트리 생성 ── */
        const treeRes = await fetch(`${API}/git/trees`, {
          method: 'POST', headers,
          body: JSON.stringify({ base_tree: baseTreeSha, tree: treeEntries })
        });
        if (!treeRes.ok) throw new Error('트리 생성 실패');

        /* ── 5단계: 커밋 생성 ── */
        const commitRes = await fetch(`${API}/git/commits`, {
          method: 'POST', headers,
          body: JSON.stringify({
            message: `Update profile data via Admin (${new Date().toLocaleDateString()})`,
            tree: (await treeRes.json()).sha,
            parents: [latestCommitSha]
          })
        });
        if (!commitRes.ok) throw new Error('커밋 생성 실패');

        /* ── 6단계: Ref 업데이트 (Push) ── */
        const updateRes = await fetch(`${API}/git/refs/heads/main`, {
          method: 'PATCH', headers,
          body: JSON.stringify({ sha: (await commitRes.json()).sha })
        });
        if (!updateRes.ok) throw new Error('Push 실패');

        showToast(`✅ 저장 성공! (이미지 ${imgCount}장 분리 저장됨)`);
        saveProfileData(D);

      } catch (e) {
        console.error(e);
        alert('저장 중 오류 발생:\n' + e.message);
        showToast('❌ 저장 실패');
      } finally {
        _saving = false;
      }
    }

        // 저장 용량 초과 에러는 무시 (GitHub에는 이미 저장됨)
        if (e.name === 'QuotaExceededError') {
          console.log('Local Storage Quota Exceeded');
        }
      }
    }

    /* YouTube 비디오 ID 추출 */
    function getYouTubeId(url) {
      if (!url) return null;
      const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
      return m ? m[1] : null;
    }

    /* Microlink API로 OG 메타데이터 가져오기 (무료 티어) */
    async function fetchLinkPreview(url) {
      if (!url) throw new Error('URL이 없습니다.');

      /* YouTube인 경우 바로 썸네일 반환 */
      const ytId = getYouTubeId(url);
      if (ytId) {
        return {
          title: '',
          description: 'YouTube 영상',
          images: [
            `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`,
            `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`
          ]
        };
      }

      /* 일반 URL → Microlink API */
      const apiUrl = `https://api.microlink.io?url=${encodeURIComponent(url)}`;
      const res = await fetch(apiUrl);
      const json = await res.json();

      if (json.status !== 'success') throw new Error('미리보기를 가져올 수 없습니다.');

      const d = json.data;
      const images = [];
      if (d.image?.url) images.push(d.image.url);
      if (d.logo?.url && images.length < 3) images.push(d.logo.url);

      return {
        title: d.title || '',
        description: d.description || '',
        images
      };
    }

    /* ── 링크/파일에서 AI 자동 입력 핸들러 (모달 내) ── */
    /* PDF에서 전체 텍스트 추출 (pdf.js 사용) */
    async function extractTextFromPdf(data) {
      const loadingTask = pdfjsLib.getDocument(data);
      const pdf = await loadingTask.promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + '\n';
      }
      return fullText;
    }

    function getGoogleDriveId(url) {
      if (!url) return null;
      const m = url.match(/[-\w]{25,}/);
      return m ? m[0] : null;
    }

    /* ── 링크/파일에서 AI 자동 입력 핸들러 (모달 내) ── */
    async function handleFetchPreview() {
      const urlInput = document.getElementById('f_link');
      const url = urlInput?.value?.trim();
      if (!url) return alert('링크를 먼저 입력해주세요.');

        let title = '';
        const driveId = getGoogleDriveId(url);

        /* 1) Google Drive 링크인 경우 (권한 필요) */
        if (url.includes('drive.google.com') || url.includes('docs.google.com')) {
          if (!accessToken) {
            // 토큰 없으면 로그인 유도
            await new Promise((resolve) => {
              tokenClient.callback = (resp) => {
                if (resp.error) throw resp;
                accessToken = resp.access_token;
                resolve();
              };
              tokenClient.requestAccessToken({ prompt: '' }); // 팝업 없이 시도, 안되면 팝업
            });
          }
          if (!gapi.client.drive) await gapi.client.load('drive', 'v3');

          /* 메타데이터 가져오기 */
          const meta = await gapi.client.drive.files.get({ fileId: driveId, fields: 'id, name, mimeType, description' });
          title = meta.result.name;

          /* 내용 가져오기 */
          if (meta.result.mimeType.includes('google-apps')) {
            const res = await gapi.client.drive.files.export({ fileId: driveId, mimeType: 'text/plain' });
            contentText = res.body;
          } else if (meta.result.mimeType.includes('pdf')) {
            resultArea.innerHTML = '<span class="fetching">📄 PDF 전체 페이지 읽는 중... (시간이 조금 걸릴 수 있습니다)</span>';
            const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${driveId}?alt=media`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
            const blob = await resp.blob();
            const arrayBuffer = await blob.arrayBuffer();
            contentText = await extractTextFromPdf(new Uint8Array(arrayBuffer));
          } else {
            // 그 외 파일은 메타데이터 설명만 사용
            contentText = meta.result.description || '';

        }

        /* 2) 일반 URL인 경우 (Microlink) */
        const preview = await fetchLinkPreview(url); // 기존 로직 재사용 (이미지/파비콘 등)

자료 URL: ${url}
제목: ${title}
전체 텍스트 내용:
${contentText ? contentText.slice(0, 15000) : '내용 없음 (제목 및 메타데이터 참조: ' + (preview.description || '') + ')'}

    /* 이미지 목록 리프레시 (모달 내) — 마우스 이벤트 드래그앤드롭 지원 */
    function refreshImageList() {
      const imgInput = document.getElementById('f_images_data');
      const container = document.getElementById('imageListView');
      if (!imgInput || !container) return;
      let images = [];
      try { images = JSON.parse(imgInput.value || '[]'); } catch (e) { }
      container.innerHTML = images.map((img, i) => `
        <div class="img-list-item" data-img-idx="${i}">

          <button class="remove-img" onclick="removeImage(${i})">✕</button>
        </div>
      `).join('');
      /* 이미지 마우스 드래그앤드롭 이벤트 바인딩 */

    }

    /* 이미지 순수 마우스 이벤트 기반 드래그앤드롭 */
    function setupImageMouseDrag(container) {
      const items = Array.from(container.querySelectorAll('.img-list-item'));
      items.forEach(el => {
        el.style.cursor = 'grab';
        el.addEventListener('mousedown', e => {
          if (e.target.closest('.remove-img')) return; /* 삭제 버튼 클릭은 무시 */
          e.preventDefault();
          const fromIdx = +el.dataset.imgIdx;
          let currentOverEl = null;
          el.classList.add('img-dragging');
          el.style.cursor = 'grabbing';

          function onMouseMove(ev) {
            items.forEach(x => x.classList.remove('img-drag-over'));
            const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.img-list-item');
            if (target && target !== el) {
              target.classList.add('img-drag-over');
              currentOverEl = target;
            } else {
              currentOverEl = null;
            }
          }

          function onMouseUp() {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            el.classList.remove('img-dragging');
            el.style.cursor = 'grab';
            items.forEach(x => x.classList.remove('img-drag-over'));

            if (currentOverEl) {
              const toIdx = +currentOverEl.dataset.imgIdx;
              if (fromIdx !== toIdx) {
                const imgInput = document.getElementById('f_images_data');
                let images = [];
                try { images = JSON.parse(imgInput.value || '[]'); } catch (ex) { }
                const [moved] = images.splice(fromIdx, 1);
                images.splice(toIdx, 0, moved);
                imgInput.value = JSON.stringify(images);
                refreshImageList();
                showToast('🖼️ 이미지 순서가 변경되었습니다');
              }
            }
          }

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup', onMouseUp);
        });
      });
    }

    function removeImage(index) {
      const imgInput = document.getElementById('f_images_data');
      let images = [];
      try { images = JSON.parse(imgInput.value || '[]'); } catch (e) { }
      images.splice(index, 1);
      imgInput.value = JSON.stringify(images);
      refreshImageList();

    /* 클립보드 이미지 붙여넣기 지원 */
    function setupClipboardPaste() {
      const modal = document.getElementById('modal');
      if (!modal) return;
      /* 기존 리스너 제거를 위해 named function 사용 */
      modal._pasteHandler && modal.removeEventListener('paste', modal._pasteHandler);
      modal._pasteHandler = async function (e) {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            const file = item.getAsFile();
            if (!file) continue;
            const reader = new FileReader();
            reader.onload = () => {
              const dataUrl = reader.result;
              const imgInput = document.getElementById('f_images_data');
              if (!imgInput) return;
              let imgs = [];
              try { imgs = JSON.parse(imgInput.value || '[]'); } catch (ex) { }
              imgs.push(dataUrl);
              imgInput.value = JSON.stringify(imgs);
              refreshImageList();
              showToast('📋 클립보드 이미지가 추가되었습니다!');
            };
            reader.readAsDataURL(file);
            break;
          }
        }
      };
      modal.addEventListener('paste', modal._pasteHandler);
    }

    function setupListDragDrop(containerId, dataKey) {
      const list = document.getElementById(containerId);
      if (!list) return;

      const items = Array.from(list.children);
      items.forEach(item => {
        const handle = item.querySelector('.drag-handle');
        if (!handle) return;

        handle.style.cursor = 'grab';
        handle.addEventListener('mousedown', e => {
          e.preventDefault(); // 텍스트 선택 방지
          const fromIdx = +item.dataset.idx;
          let currentTargetItem = null;

          item.classList.add('dragging');
          item.style.position = 'relative';
          item.style.zIndex = '1000';
          item.style.opacity = '0.6';
          item.style.boxShadow = '0 8px 16px rgba(0,0,0,0.2)';
          document.body.style.cursor = 'grabbing';

          const initialY = e.clientY;
          const rect = item.getBoundingClientRect();
          const offsetY = initialY - rect.top;

          // Placeholder 생성
          const placeholder = document.createElement('div');
          placeholder.style.height = rect.height + 'px';
          placeholder.style.background = 'rgba(229, 9, 20, 0.1)';
          placeholder.style.border = '2px dashed var(--red)';
          placeholder.style.borderRadius = '8px';
          placeholder.style.marginBottom = '12px';

          item.parentNode.insertBefore(placeholder, item);
          item.style.position = 'absolute';
          item.style.top = (rect.top + window.scrollY) + 'px';
          item.style.left = rect.left + 'px';
          item.style.width = rect.width + 'px';

          function onMouseMove(ev) {
            const moveY = ev.clientY;
            item.style.top = (moveY - offsetY + window.scrollY) + 'px';

            // 현재 위치 아래의 아이템 찾기
            const siblings = Array.from(list.children).filter(el => el !== item && el !== placeholder && el.dataset.idx);

            let found = false;
            for (const sibling of siblings) {
              const sibRect = sibling.getBoundingClientRect();
              const sibMid = sibRect.top + sibRect.height / 2;

              if (moveY < sibMid) {
                list.insertBefore(placeholder, sibling);
                found = true;
                break;
              }
            }
            if (!found) {
              list.appendChild(placeholder);
            }
          }

          function onMouseUp() {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);

            // 스타일 복구
            item.classList.remove('dragging');
            item.style.position = '';
            item.style.zIndex = '';
            item.style.opacity = '';
            item.style.boxShadow = '';
            item.style.top = '';
            item.style.left = '';
            item.style.width = '';
            document.body.style.cursor = '';

            // 실제 DOM 이동
            list.insertBefore(item, placeholder);
            placeholder.remove();

            // 데이터 순서 업데이트
            const newOrderIndices = Array.from(list.children).map(child => +child.dataset.idx).filter(n => !isNaN(n));

            // 현재 UI 순서대로 데이터 재정렬 (인덱스 보정 필요 없음, map으로 재구성)
            // 주의: data-idx는 초기 렌더링 시의 인덱스이므로, 현재 DOM 순서대로 데이터를 가져와야 함
            const currentData = D[dataKey];
            const newData = [];

            // DOM 순서대로 기존 데이터 매핑
            const domItems = Array.from(list.children).filter(el => el.hasAttribute('data-idx'));
            domItems.forEach(el => {
              const oldIdx = +el.dataset.idx;
              if (currentData[oldIdx]) newData.push(currentData[oldIdx]);
            });

            if (newData.length === currentData.length) {
              D[dataKey] = newData;
              save();
              render();
              showToast('✅ 순서가 변경되었습니다');
            } else {
              console.error('Data mismatch during resort');
              render(); // 복구
            }
          }

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup', onMouseUp);
        });
      });
    }

    /* ══════════════════════════════════════════

       ══════════════════════════════════════════ */
    function setupTableDragDrop(tbodyId, dataKey) {
      const tbody = document.getElementById(tbodyId);
      if (!tbody) return;

      const rows = Array.from(tbody.querySelectorAll('tr[data-idx]'));
      rows.forEach(row => {
        const handle = row.querySelector('.drag-handle');
        if (!handle) return;

        handle.addEventListener('mousedown', e => {
          e.preventDefault();
          const fromIdx = +row.dataset.idx;
          let currentTargetRow = null;
          row.classList.add('dragging');
          row.style.opacity = '0.4';
          document.body.style.cursor = 'grabbing';
          document.body.style.userSelect = 'none';

          function onMouseMove(ev) {
            /* 모든 행의 인디케이터 제거 */
            rows.forEach(r => {
              r.style.borderTop = '';
              r.style.borderBottom = '';
            });
            /* 현재 마우스 위치 아래의 행 찾기 */
            const allRows = Array.from(tbody.querySelectorAll('tr[data-idx]'));
            currentTargetRow = null;
            for (const r of allRows) {
              const rect = r.getBoundingClientRect();
              if (ev.clientY >= rect.top && ev.clientY <= rect.bottom) {
                if (r !== row) {
                  currentTargetRow = r;
                  const mid = rect.top + rect.height / 2;
                  if (ev.clientY < mid) {
                    r.style.borderTop = '3px solid var(--red)';
                  } else {
                    r.style.borderBottom = '3px solid var(--red)';
                  }
                }
                break;
              }
            }
          }

          function onMouseUp() {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            row.classList.remove('dragging');
            row.style.opacity = '';
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            /* 모든 인디케이터 제거 */
            rows.forEach(r => {
              r.style.borderTop = '';
              r.style.borderBottom = '';
            });

            if (currentTargetRow) {
              const toIdx = +currentTargetRow.dataset.idx;
              if (fromIdx !== toIdx) {
                const arr = D[dataKey];
                const [moved] = arr.splice(fromIdx, 1);
                arr.splice(toIdx, 0, moved);
                render();
                showToast('✅ 순서가 변경되었습니다');
              }
            }
          }

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup', onMouseUp);
        });
      });
    }

    function showToast(msg) { const t = document.createElement('div'); t.textContent = msg; Object.assign(t.style, { position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)', background: '#22c55e', color: '#fff', padding: '10px 24px', borderRadius: '8px', fontSize: '.85rem', fontWeight: '600', zIndex: '9999', boxShadow: '0 4px 16px rgba(0,0,0,.3)' }); document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
    function setApiKey(k) { localStorage.setItem('gemini_api_key', k); }
    function getClientId() { return localStorage.getItem('google_client_id') || ''; }
    function setClientId(k) { localStorage.setItem('google_client_id', k); }

    let tokenClient;
    let accessToken = null;
    let pickerInited = false;
    let gisInited = false;

    function gapiLoaded() { gapi.load('client:picker', async () => { await gapi.client.load('drive', 'v3'); pickerInited = true; }); }
    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: getClientId(),
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: (resp) => {
          if (resp.error !== undefined) throw (resp);
          accessToken = resp.access_token;
          if (pendingPicker) createPicker();
        },
      });
      gisInited = true;
    }

    let pendingPicker = false;
    function handleAuthClick() {
      const clientId = getClientId();
      if (!clientId) return alert('Google Client ID를 먼저 설정해주세요.');

      /* Client ID가 변경되었을 수 있으므로 재초기화 시도 */
      if (!tokenClient || tokenClient.client_id !== clientId) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: clientId,
          scope: 'https://www.googleapis.com/auth/drive.readonly',
          callback: (resp) => {
            if (resp.error !== undefined) throw (resp);
            accessToken = resp.access_token;
            if (pendingPicker) createPicker();
          },
        });
      }

      pendingPicker = true;
      if (accessToken === null) {
        tokenClient.requestAccessToken({ prompt: 'consent' });
      } else {
        tokenClient.requestAccessToken({ prompt: '' });
      }
    }

    function createPicker() {
      if (!pickerInited) return alert('Google API 로딩 중...');
      const view = new google.picker.View(google.picker.ViewId.DOCS);
      view.setMimeTypes('application/vnd.google-apps.document,application/vnd.google-apps.presentation,application/pdf,image/png,image/jpeg');
      const picker = new google.picker.PickerBuilder()
        .enableFeature(google.picker.Feature.NAV_HIDDEN)
        .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
        .setAppId(getClientId())
        .setOAuthToken(accessToken)
        .addView(view)
        .setCallback(pickerCallback)
        .build();
      picker.setVisible(true);
      pendingPicker = false;
    }

    async function pickerCallback(data) {
      if (data.action === google.picker.Action.PICKED) {
        const fileId = data.docs[0].id;
        const mimeType = data.docs[0].mimeType;

        const status = document.getElementById('fileStatus') || document.getElementById('previewResult');
        if (status) status.innerHTML = `<div class="ai-status"><span class="fetching">🔄 "${name}" 내용 가져오는 중...</span></div>`;

        try {
          const content = await fetchDriveContent(fileId, mimeType);

          /* PDF인 경우 페이지 선택기 호출 */

          } else {
            /* 개별 폼 자동 입력 */
            status.innerHTML = `<div class="ai-status"><span class="fetching">🤖 "${name}" 분석 중...</span></div>`;
            const prompt = `다음 문서의 내용을 분석해주세요.
파일이름: ${name}
내용:
${content.substring(0, 30000)}

이 내용을 분석하여 아래 JSON으로만 응답해주세요:

            /* 썸네일 추가 시도 (권한 문제로 보일지 모르지만 링크라도 저장) */
            const imgInput = document.getElementById('f_images_data');
            if (imgInput) {
              let imgs = [];
              try { imgs = JSON.parse(imgInput.value || '[]'); } catch (e) { }
              imgs.push(`https://lh3.googleusercontent.com/d/${fileId}=w1000`);
              imgInput.value = JSON.stringify(imgs);
              refreshImageList();

            if (status) status.innerHTML = `<div style="font-size:.82rem;color:var(--green);margin-bottom:8px">✅ 구글 드라이브 파일 분석 완료!</div>`;
          }
        } catch (err) {
          if (status) status.innerHTML = `<div class="ai-status" style="color:#ef4444">❌ 오류: ${err.message}</div>`;
        }
      }
    }

    async function fetchDriveContent(fileId, mimeType) {
      if (!gapi.client.drive) await gapi.client.load('drive', 'v3');

      let res;
      if (mimeType.includes('google-apps.document') || mimeType.includes('google-apps.presentation')) {
        /* 구글 문서는 텍스트로 내보내기 */
        res = await gapi.client.drive.files.export({ fileId: fileId, mimeType: 'text/plain' });
        return res.body;
      } else if (mimeType.includes('pdf') || mimeType.includes('image')) {
        /* PDF나 이미지는 Vision API 사용을 위해 Base64로 받아야 함 - 일단 텍스트 추출 불가 시 메타데이터만? 
           PDF 내용을 읽으려면 drive.files.get alt=media로 받아서 pdf.js 필요... 
           여기선 간단히 이미지는 base64 get, PDF는 파일명/메타데이터만 사용하는 것으로 타협하거나
           Gemini Vision이 PDF도 지원하므로 PDF도 base64로 받아서 Vision에 던질 수 있음.
        */
        /* PDF Download logic needs token */
        const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        // For now, simpler approach: return just file name/metadata if binary
        // Actually Gemini Vision can handle PDF base64. Let's try to get blob -> base64
        const blob = await resp.blob();
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result); // Data URL
          reader.readAsDataURL(blob);
        });
      }
      return '';
    }

    function setupDropArea() {
      const drop = document.getElementById('dropArea');

      drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
      drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
      input.addEventListener('change', e => handleFiles(e.target.files));
    }

        try {

          showAiResult(result, [base64ToDataUrl(base64, mime)]);

          status.innerHTML = `<div class="ai-status" style="color:#ef4444">❌ 분석 실패: ${err.message}</div>`;

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function base64ToDataUrl(b64, mime) { return `data:${mime};base64,${b64}`; }

    async function callGeminiVision(base64, mime) {
      const key = getApiKey();
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inlineData: { mimeType: mime, data: base64 } },
              {
                text: `이 이미지를 분석해주세요. 상장, 공문(강의 의뢰서), 강의 슬라이드, 뉴스 기사 스크린샷 등일 수 있습니다.
이미지 내용을 파악하여 아래 JSON 형식으로만 응답해주세요(JSON만, 설명 없이):
{"category":"lectures|awards|press|publications|activities","title":"제목 또는 상장명","org":"수여기관/주최기관","year":2025,"date":"날짜(있으면)","description":"주요 내용 요약","highlight":false,"source":"매체명(보도자료인 경우)"}

category 판단 기준:
- 상장/표창장/감사장 → awards
- 강의 의뢰 공문/강연 관련 → lectures
- 신문기사/보도자료 → press
- 책 표지/출판 관련 → publications
- 기타 활동 → activities` }
            ]
          }]
        })
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error.message);
      const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
      return parseGeminiJson(text);
    }

    async function callGeminiText(prompt) {
      const key = getApiKey();
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error.message);
      const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
      return parseGeminiJson(text);
    }

    function parseGeminiJson(text) {
      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('AI 응답을 파싱할 수 없습니다.');
      return JSON.parse(m[0]);
    }

      justify-content: center;
      color: transparent;
      border: 2px solid rgba(255, 255, 255, .5);
      transition: all .2s;
      pointer-events: none;
    }

    .pdf-page-item.selected .pdf-check {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
  </style>
  <script>
    let currentPdfDoc = null;
    let selectedPdfPages = new Set();
    let currentPdfImages = []; /* 렌더링된 이미지 데이터 저장 */

    async function openPageSelector(data) {
      const modal = document.getElementById('pageSelectorModal');
      const grid = document.getElementById('pdfPageGrid');
      const counter = document.getElementById('selectedCount');

      modal.classList.add('open');
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px"><span class="fetching">PDF 로딩 중...</span></div>';
      selectedPdfPages.clear();
      currentPdfImages = [];
      counter.textContent = '0장 선택됨';

      try {
        const loadingTask = pdfjsLib.getDocument(data);
        currentPdfDoc = await loadingTask.promise;

        grid.innerHTML = '';
        for (let i = 1; i <= currentPdfDoc.numPages; i++) {
          renderPdfPageThumbnail(i, grid);
        }
      } catch (err) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--red)">PDF 로드 실패: ${err.message}</div>`;
      }
    }

    async function renderPdfPageThumbnail(num, container) {
      const page = await currentPdfDoc.getPage(num);
      const scale = 0.5; /* 썸네일용 스케일 */
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      await page.render({ canvasContext: context, viewport: viewport }).promise;

      const imgData = canvas.toDataURL('image/jpeg', 0.8);
      currentPdfImages[num] = imgData;

      const div = document.createElement('div');
      div.className = 'pdf-page-item';
      div.onclick = () => togglePdfPage(num, div);
      div.innerHTML = `
        <img src="${imgData}"/>
        <div class="pdf-check">✔</div>
        <div class="pdf-page-num">${num}</div>
      `;
      container.appendChild(div);
    }

    function togglePdfPage(num, el) {
      if (selectedPdfPages.has(num)) {
        selectedPdfPages.delete(num);
        el.classList.remove('selected');
      } else {
        selectedPdfPages.add(num);
        el.classList.add('selected');
      }
      document.getElementById('selectedCount').textContent = `${selectedPdfPages.size}장 선택됨`;
    }

    function closePageSelector() {
      document.getElementById('pageSelectorModal').classList.remove('open');
      currentPdfDoc = null;
    }

    function confirmPageSelection() {
      if (selectedPdfPages.size === 0) return alert('최소 1장의 페이지를 선택해주세요.');

      /* 선택된 페이지를 이미지 리스트에 추가 */
      const sortedPages = Array.from(selectedPdfPages).sort((a, b) => a - b);
      const newImages = sortedPages.map(p => currentPdfImages[p]);

      /* 현재 열려있는 폼이 있는지 확인 (Auto Register vs Individual Form) */
      if (currentTab === 'autoRegister') {
        /* Auto Register에서는 'showAiResult' 호출 시 이미지를 전달해야 함 */
        /* 하지만 analyzeUrl 등이 호출된 상태가 아니므로, 전역 변수나 콜백 필요 */
        /* 여기서는 간단히 'aiResults' 영역에 미리보기를 띄우고, 추후 AI 분석 시 사용되도록... */
        /* 복잡: Auto Register 로직이 Analyze -> Show Result 순서임. */
        /* 따라서, Auto Register에서는 'File Upload' -> 'Page Selector' -> 'Gemini Calc' 순서로 가야 함. */
        /* handleFormFileUpload나 pickerCallback에서 이 흐름을 제어해야 함. */

        /* 일단 이벤트를 발생시켜 처리하거나 전역 변수 사용 */
        window.lastSelectedImages = newImages;
        /* Analyze Trigger */
        if (window.pendingAnalysisFile) {
          analyzePdfTextWithImages(window.pendingAnalysisFile, newImages);
        }
      } else {
        /* 개별 폼 (Edit Mode) */
        const imgInput = document.getElementById('f_images_data');
        if (imgInput) {
          let imgs = [];
          try { imgs = JSON.parse(imgInput.value || '[]'); } catch (e) { }
          /* 기존 이미지 유지? 아니면 교체? 사용자 선택 존중하여 추가 */
          newImages.forEach(img => imgs.push(img));
          imgInput.value = JSON.stringify(imgs);
          refreshImageList();
          showToast(`페이지 ${newImages.length}장이 추가되었습니다.`);
        }
      }
      closePageSelector();
    }
  </script>
</body>

</html>
